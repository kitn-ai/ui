<!doctype html>
<!--
  examples/remote-host/index.html
  ===============================
  REFERENCE HOST PAGE for the remote (iframe) Card transport.

  This is the cross-origin counterpart to examples/remote-provider/. It is the
  host side of the standalone Playwright matrix (tests/e2e/remote-element.spec.ts):

    - host page  → http://localhost:6006  (this file, served by Vite)
    - provider   → http://localhost:6007  (examples/remote-provider/)

  Two distinct origins ⇒ REAL cross-origin postMessage.

  A production host MUST set `Content-Security-Policy: frame-ancestors 'self'` (or
  'none') on its OWN responses so it can't be reframed, and rely on the provider's
  `frame-ancestors` to admit only this origin. See the security model in the
  Generative UI overview docs.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remote Card Host (dev / e2e)</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 24px; max-width: 720px; color: #18181b; }
      h1 { font-size: 18px; }
      #card { border: 1px solid #e4e4e7; border-radius: 12px; overflow: hidden; min-height: 40px; }
      .controls { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
      button { font: inherit; padding: 6px 12px; border: 1px solid #d4d4d8; border-radius: 8px; background: #fff; cursor: pointer; }
      pre#log { background: #f4f4f5; border-radius: 8px; padding: 12px; font-size: 12px; max-height: 240px; overflow: auto; white-space: pre-wrap; }
      .meta { font-size: 12px; color: #71717a; }
    </style>
  </head>
  <body>
    <h1>Remote Card Host</h1>
    <p class="meta">Bridge state: <strong id="status">connecting</strong></p>

    <div class="controls">
      <button id="toggle-theme" type="button">Toggle theme</button>
      <button id="inject-bad" type="button">Inject wrong-origin message</button>
    </div>

    <!-- The remote card mounts here (one sandboxed cross-origin iframe). -->
    <div id="card"></div>

    <h2 style="font-size: 14px;">Routed CardEvents</h2>
    <pre id="log"></pre>

    <script type="module" src="./host-entry.ts"></script>
  </body>
</html>
