<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kai-chat — full chat (vanilla / CDN)</title>
    <link rel="icon" type="image/svg+xml" href="../shared/logo.svg" />
    <style>
      /* No build step: the web components style themselves inside Shadow DOM,
         so the host page only needs layout + a little chrome. */
      html,
      body { margin: 0; height: 100%; font-family: system-ui, sans-serif; background: #fff; }
      body.dark { background: #0a0a0b; }

      .topbar {
        display: flex; align-items: center; justify-content: space-between;
        height: 48px; padding: 0 14px; box-sizing: border-box;
        border-bottom: 1px solid #e5e5e5;
      }
      body.dark .topbar { border-bottom-color: #27272a; }
      .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; color: #18181b; }
      body.dark .brand { color: #fafafa; }
      .brand img { width: 20px; height: 20px; }

      .app { display: flex; height: calc(100vh - 49px); }
      /* CSS `resize` makes the sidebar drag-resizable horizontally — no JS. */
      kai-conversations {
        width: 300px; flex: none; border-right: 1px solid #e5e5e5;
        resize: horizontal; overflow: auto; min-width: 200px; max-width: 460px;
      }
      body.dark kai-conversations { border-right-color: #27272a; }
      kai-chat { flex: 1; min-width: 0; }

      .icon-btn {
        display: inline-flex; align-items: center; justify-content: center;
        width: 34px; height: 34px; border-radius: 9px;
        border: 1px solid #d4d4d8; background: #fff; color: #18181b; cursor: pointer;
      }
      .icon-btn:hover { background: #f4f4f5; }
      body.dark .icon-btn { background: #18181b; color: #fafafa; border-color: #3f3f46; }
      body.dark .icon-btn:hover { background: #27272a; }
      .icon-btn svg { width: 18px; height: 18px; }

      /* A tiny toast for action feedback (copy / like / …). */
      .toast {
        position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%) translateY(8px);
        background: #18181b; color: #fafafa; font: 500 13px system-ui, sans-serif;
        padding: 8px 14px; border-radius: 8px; opacity: 0; pointer-events: none;
        transition: opacity .15s, transform .15s; z-index: 50;
      }
      .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

      /* Responsive: the sidebar slides in over the chat on small screens. */
      @media (max-width: 720px) {
        kai-conversations {
          position: fixed; inset: 49px auto 0 0; height: calc(100vh - 49px); width: 280px;
          z-index: 10; transform: translateX(-100%); transition: transform .2s ease;
        }
        body.sidebar-open kai-conversations { transform: translateX(0); box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.35); }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <span class="brand"><img src="../shared/logo.svg" alt="" />kai-chat</span>
      <button id="theme-btn" class="icon-btn" type="button" aria-label="Toggle light/dark"></button>
    </header>
    <div class="app">
      <kai-conversations id="list"></kai-conversations>
      <kai-chat id="chat"></kai-chat>
    </div>
    <div id="toast" class="toast"></div>

    <!-- One line from the CDN registers <kai-chat>, <kai-conversations>,
         <kai-prompt-input>. SolidJS + styles are bundled in. Pin a version
         (…/@kitn.ai/ui@1.2.3) for reproducibility; jsDelivr also works. -->
    <script type="module" src="https://unpkg.com/@kitn.ai/ui"></script>

    <script type="module">
      import { configureCodeHighlighting } from 'https://unpkg.com/@kitn.ai/ui';

      // Built-in languages: bash, javascript, html, css, json. Register anything
      // else at runtime (no rebuild) by pointing the loader at a CDN ESM URL.
      configureCodeHighlighting({
        languages: {
          python: () => import('https://esm.sh/@shikijs/langs@4/python'),
          typescript: () => import('https://esm.sh/@shikijs/langs@4/typescript'),
          markdown: () => import('https://esm.sh/@shikijs/langs@4/markdown'),
        },
        aliases: { py: 'python', ts: 'typescript', md: 'markdown' },
      });

      const list = document.getElementById('list');
      const chat = document.getElementById('chat');
      const toastEl = document.getElementById('toast');

      // ---------------------------------------------------------------- data
      list.groups = [
        { id: 'g-work', name: 'Work', sortOrder: 0, createdAt: '2026-06-01T09:00:00.000Z' },
        { id: 'g-personal', name: 'Personal', sortOrder: 1, createdAt: '2026-06-02T09:00:00.000Z' },
      ];
      const conversations = [
        { id: 'c-1', title: 'SolidJS vs React benchmark', groupId: 'g-work', scope: { type: 'collection' }, messageCount: 2, lastMessageAt: '2026-06-10T15:30:00.000Z', updatedAt: '2026-06-10T15:30:00.000Z' },
        { id: 'c-2', title: 'Centering a div', groupId: 'g-work', scope: { type: 'collection' }, messageCount: 2, lastMessageAt: '2026-06-09T14:20:00.000Z', updatedAt: '2026-06-09T14:20:00.000Z' },
        { id: 'c-3', title: 'Read a CSV in Python', groupId: 'g-personal', scope: { type: 'collection' }, messageCount: 2, lastMessageAt: '2026-06-08T11:05:00.000Z', updatedAt: '2026-06-08T11:05:00.000Z' },
        { id: 'c-4', title: 'TypeScript generics', groupId: 'g-personal', scope: { type: 'collection' }, messageCount: 2, lastMessageAt: '2026-06-07T10:00:00.000Z', updatedAt: '2026-06-07T10:00:00.000Z' },
      ];
      list.conversations = conversations;

      const conversationMessages = {
        'c-1': [
          { id: 'm1', role: 'user', content: 'Can you benchmark SolidJS vs React for rendering 10,000 list items?', attachments: [{ id: 'a1', type: 'file', filename: 'requirements.pdf', mediaType: 'application/pdf' }, { id: 'a2', type: 'source-document', filename: 'SolidJS Docs', title: 'SolidJS Reactivity', url: 'https://solidjs.com/docs' }] },
          { id: 'm2', role: 'assistant', actions: ['copy', 'like', 'dislike', 'regenerate'], reasoning: { label: 'Thought for 4 seconds', text: 'Render the same 10,000-item list in both frameworks and time initial render + single-item updates. SolidJS should win on updates via fine-grained reactivity.' }, tools: [{ type: 'run_benchmark', state: 'output-available', input: { framework: ['solid', 'react'], itemCount: 10000, iterations: 5 }, output: { solid: { avgRenderMs: 12.4, avgUpdateMs: 0.8 }, react: { avgRenderMs: 89.2, avgUpdateMs: 34.1 } }, toolCallId: 'call_abc123' }], content: 'Here are the results for 10,000 list items:\n\n| Metric | SolidJS | React | Difference |\n|--------|---------|-------|-----------|\n| Initial render | 12.4ms | 89.2ms | **7.2× faster** |\n| Single item update | 0.8ms | 34.1ms | **42.6× faster** |\n\nSolidJS updates only the changed DOM node; React diffs the whole list.' },
        ],
        'c-2': [
          { id: 'm1', role: 'user', content: 'How do I center a div?' },
          { id: 'm2', role: 'assistant', actions: ['copy', 'like', 'dislike'], content: 'The modern way is a grid:\n\n```css\n.box {\n  display: grid;\n  place-items: center;\n}\n```\n\nThat centers the child on both axes — no magic numbers.' },
        ],
        'c-3': [
          { id: 'm1', role: 'user', content: 'Read a CSV and print the first row in Python.' },
          { id: 'm2', role: 'assistant', actions: ['copy', 'like', 'dislike'], content: 'Use the built-in `csv` module:\n\n```python\nimport csv\n\nwith open("data.csv", newline="") as f:\n    reader = csv.DictReader(f)\n    print(next(reader))\n```\n\n`DictReader` maps each row to a dict keyed by the header.' },
        ],
        'c-4': [
          { id: 'm1', role: 'user', content: 'Show a generic `identity` function in TypeScript.' },
          { id: 'm2', role: 'assistant', actions: ['copy', 'like', 'dislike'], content: 'A type parameter preserves the input type:\n\n```typescript\nfunction identity<T>(value: T): T {\n  return value;\n}\n\nconst n = identity(42);    // number\nconst s = identity("hi");  // string\n```' },
        ],
      };

      chat.suggestions = ['How does SolidJS handle context?', 'Show me a store example', 'SolidJS vs Svelte'];

      // ---- Opt-in full-parity features: header (title + model switcher +
      //      context meter) and the input toolbar's search/voice buttons. ----
      chat.models = [
        { id: 'claude-4', name: 'Claude 4 Opus', provider: 'Anthropic' },
        { id: 'claude-4-sonnet', name: 'Claude 4 Sonnet', provider: 'Anthropic' },
        { id: 'gpt-4o', name: 'GPT-4o', provider: 'OpenAI' },
      ];
      chat.currentModel = 'claude-4';
      chat.context = { usedTokens: 12400, maxTokens: 200000, inputTokens: 8200, outputTokens: 4200, estimatedCost: 0.042 };
      chat.search = true;
      chat.voice = true;

      // ------------------------------------------------------------- helpers
      let activeId = 'c-1';
      function open(id) {
        activeId = id;
        list.activeId = id;
        chat.messages = conversationMessages[id] ?? [];
        const conv = conversations.find((c) => c.id === id);
        chat.chatTitle = conv ? conv.title : 'New chat'; // header title
        document.body.classList.remove('sidebar-open'); // close drawer on mobile
      }

      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toast._t);
        toast._t = setTimeout(() => toastEl.classList.remove('show'), 1400);
      }

      // "Stream" an assistant reply word-by-word for a realistic feel.
      function streamReply(convId, fullText) {
        const words = fullText.split(' ');
        const replyId = 'a' + Date.now();
        let i = 0;
        const setMsgs = (msgs) => { conversationMessages[convId] = msgs; if (convId === activeId) chat.messages = msgs; };
        setMsgs([...(conversationMessages[convId] ?? []), { id: replyId, role: 'assistant', content: '' }]);
        const timer = setInterval(() => {
          i += 1;
          const partial = words.slice(0, i).join(' ');
          const done = i >= words.length;
          setMsgs(conversationMessages[convId].map((m) =>
            m.id === replyId ? { ...m, content: partial, actions: done ? ['copy', 'like', 'dislike', 'regenerate'] : undefined } : m
          ));
          if (done) { clearInterval(timer); chat.loading = false; }
        }, 45);
      }

      function reply(text) {
        return `Thanks — here's a quick take.\n\n> ${text}\n\nThis demo streams a canned reply and runs entirely from the CDN; wire the \`submit\` event to your backend to stream a real model response.`;
      }

      open(activeId);

      // -------------------------------------------------------------- events
      list.addEventListener('kai-conversation-select', (e) => open(e.detail.id));
      list.addEventListener('kai-toggle-sidebar', () => document.body.classList.toggle('sidebar-open'));
      list.addEventListener('kai-new-chat', () => {
        const id = 'c-' + Date.now();
        conversations.unshift({ id, title: 'New chat', groupId: 'g-work', scope: { type: 'collection' }, messageCount: 0, lastMessageAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
        list.conversations = [...conversations];
        conversationMessages[id] = []; // empty state: just the input + suggestions
        open(id);
      });

      // Send: append the user message (with any attachments), show loading, stream a reply.
      chat.addEventListener('kai-submit', (e) => {
        const value = (e.detail.value || '').trim();
        const attachments = e.detail.attachments || [];
        if (!value && !attachments.length) return;
        const convId = activeId;
        conversationMessages[convId] = [
          ...(conversationMessages[convId] ?? []),
          { id: 'u' + Date.now(), role: 'user', content: value, attachments: attachments.length ? attachments : undefined },
        ];
        chat.messages = conversationMessages[convId];
        chat.loading = true;
        setTimeout(() => streamReply(convId, reply(value || 'your attachment')), 450);
      });

      // Header model switcher + input toolbar buttons.
      chat.addEventListener('kai-model-change', (e) => { chat.currentModel = e.detail.modelId; toast('Model: ' + e.detail.modelId); });
      chat.addEventListener('kai-search', () => toast('Web search toggled'));
      chat.addEventListener('kai-voice', () => toast('Voice input (demo)'));

      // Working message actions.
      chat.addEventListener('kai-message-action', async (e) => {
        const { messageId, action } = e.detail;
        const msgs = conversationMessages[activeId] ?? [];
        const msg = msgs.find((m) => m.id === messageId);
        if (!msg) return;
        if (action === 'copy') {
          try { await navigator.clipboard.writeText(msg.content); toast('Copied to clipboard'); } catch { toast('Copy failed'); }
        } else if (action === 'like' || action === 'dislike') {
          toast(action === 'like' ? 'Glad it helped 👍' : 'Thanks — noted 👎');
        } else if (action === 'regenerate') {
          const idx = msgs.findIndex((m) => m.id === messageId);
          conversationMessages[activeId] = msgs.slice(0, idx);
          chat.messages = conversationMessages[activeId];
          chat.loading = true;
          setTimeout(() => streamReply(activeId, reply('regenerated answer')), 350);
        }
      });

      // ----------------------------------------------- theme (persisted + OS)
      const themeBtn = document.getElementById('theme-btn');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)');
      const SUN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>';
      const MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>';
      let theme = localStorage.getItem('kitn-theme') || 'auto'; // 'auto' | 'light' | 'dark'

      const isDark = () => theme === 'dark' || (theme === 'auto' && systemDark.matches);
      function applyTheme() {
        chat.theme = theme;
        list.theme = theme;
        const dark = isDark();
        document.body.classList.toggle('dark', dark);
        themeBtn.innerHTML = dark ? MOON : SUN;
        localStorage.setItem('kitn-theme', theme);
      }
      themeBtn.addEventListener('click', () => { theme = isDark() ? 'light' : 'dark'; applyTheme(); });
      systemDark.addEventListener('change', () => { if (theme === 'auto') applyTheme(); });
      applyTheme();
    </script>
  </body>
</html>
