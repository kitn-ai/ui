<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kitn — composable web components (SPIKE)</title>

  <!-- Local build of the SAME single ESM bundle. One import registers every
       element (including the three new composable leaf elements). -->
  <script type="module" src="../../dist/kitn-chat.es.js"></script>
  <link rel="stylesheet" href="../../theme.css" />

  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; min-height: 100vh; padding: 2rem;
      font-family: system-ui, sans-serif;
      background: var(--color-background); color: var(--color-foreground);
      display: grid; gap: 2rem; max-width: 880px; margin-inline: auto;
    }
    h1 { font-size: 1.25rem; margin: 0; }
    h2 { font-size: .95rem; margin: 0 0 .75rem; color: var(--color-muted-foreground); }
    section { border: 1px solid var(--color-border); border-radius: 12px; padding: 1.25rem; }
    .row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .bar { display: flex; align-items: center; justify-content: space-between; }
    button.host { font: inherit; padding: .4rem .7rem; border-radius: 8px;
      border: 1px solid var(--color-border); background: var(--color-muted);
      color: var(--color-foreground); cursor: pointer; }
    #log { font: 12px ui-monospace, monospace; white-space: pre-wrap;
      background: var(--color-muted); border-radius: 8px; padding: .75rem;
      max-height: 160px; overflow: auto; margin: 0; }
  </style>
</head>

<body>
  <div class="bar">
    <h1>Composable web components — spike</h1>
    <button class="host" id="theme">Toggle theme</button>
  </div>

  <!-- ── Case 1: icon + label (variant="inline") ───────────────────────── -->
  <section>
    <h2>&lt;kitn-attachments variant="inline"&gt; — icon + label</h2>
    <kitn-attachments id="inline" variant="inline" show-media-type></kitn-attachments>
  </section>

  <!-- ── Case 2: visual + hover card + removable (variant="grid") ──────── -->
  <section>
    <h2>&lt;kitn-attachments variant="grid" hover-card removable&gt; — visual + hover + remove</h2>
    <kitn-attachments id="grid" variant="grid" hover-card removable></kitn-attachments>
  </section>

  <!-- ── Event-emitting leaf ───────────────────────────────────────────── -->
  <section>
    <h2>&lt;kitn-model-switcher&gt; — emits <code>modelchange</code></h2>
    <div class="row">
      <kitn-model-switcher id="models"></kitn-model-switcher>
    </div>
  </section>

  <!-- ── Pure leaf (animated thinking) ─────────────────────────────────── -->
  <section>
    <h2>&lt;kitn-thinking-bar stoppable&gt; — emits <code>stop</code></h2>
    <kitn-thinking-bar id="think" text="Thinking…" stoppable stop-label="Answer now"></kitn-thinking-bar>
  </section>

  <section>
    <h2>Event log</h2>
    <pre id="log">(interactions appear here)</pre>
  </section>

  <script type="module">
    const log = (msg) => {
      const el = document.getElementById('log');
      el.textContent = `${new Date().toLocaleTimeString()}  ${msg}\n` + el.textContent;
    };

    // A tiny inline SVG so the grid thumbnail renders offline.
    const img =
      'data:image/svg+xml;utf8,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96">' +
        '<rect width="96" height="96" fill="%237c3aed"/>' +
        '<text x="48" y="56" font-size="40" text-anchor="middle" fill="white">★</text></svg>');

    const items = () => ([
      { id: '1', type: 'file', filename: 'diagram.png', mediaType: 'image/png', url: img },
      { id: '2', type: 'file', filename: 'notes.pdf',   mediaType: 'application/pdf' },
      { id: '3', type: 'source-document', title: 'kitn.dev', filename: 'kitn.dev' },
    ]);

    // Case 1 + Case 2 — same data, different presentation via attributes only.
    document.getElementById('inline').items = items();

    const grid = document.getElementById('grid');
    grid.items = items();
    grid.addEventListener('remove', (e) => {
      log(`attachments: remove ${e.detail.id}`);
      grid.items = grid.items.filter((x) => x.id !== e.detail.id);
    });

    // Model switcher (renders only with >1 model).
    const models = document.getElementById('models');
    models.models = [
      { id: 'opus',  name: 'Claude Opus',  provider: 'Anthropic' },
      { id: 'haiku', name: 'Claude Haiku', provider: 'Anthropic' },
    ];
    models.currentModel = 'opus';
    models.addEventListener('modelchange', (e) => {
      models.currentModel = e.detail.modelId;
      log(`model: ${e.detail.modelId}`);
    });

    // Thinking bar.
    document.getElementById('think').addEventListener('stop', () => log('thinking: stop'));

    // Theme toggle — proves dark mode still pierces the SHARED stylesheet.
    let dark = false;
    document.getElementById('theme').addEventListener('click', () => {
      dark = !dark;
      for (const el of document.querySelectorAll('kitn-attachments, kitn-model-switcher, kitn-thinking-bar')) {
        el.setAttribute('theme', dark ? 'dark' : 'light');
      }
      document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
      log(`theme: ${dark ? 'dark' : 'light'}`);
    });

    // Sanity: how many shadow roots share the single constructable stylesheet?
    requestAnimationFrame(() => {
      const roots = [...document.querySelectorAll('kitn-attachments, kitn-model-switcher, kitn-thinking-bar')]
        .map((el) => el.shadowRoot).filter(Boolean);
      const adopted = roots.filter((r) => r.adoptedStyleSheets?.length).length;
      log(`shared stylesheet adopted by ${adopted}/${roots.length} shadow roots`);
    });
  </script>
</body>
</html>
