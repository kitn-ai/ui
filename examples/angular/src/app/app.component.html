<!--
  kai-chat Angular example template.

  Key Angular web-component patterns:
    [prop]="value"    — sets the DOM *property* (not an attribute string); this is
                        how you pass arrays/objects into Shadow-DOM custom elements.
    (eventname)="fn($event)"  — listens for CustomEvents; Angular matches by the
                        lowercase event name.  `($event as CustomEvent).detail`
                        carries the payload (handled in the component class).
-->

<div
  class="app-shell"
  [style.background]="appBackground"
  [style.color]="appColor"
>
  <!-- Top bar -->
  <header class="topbar" [style.borderBottom]="'1px solid ' + borderColor">
    <span class="topbar-brand">
      <img src="../shared/logo.svg" alt="" width="20" height="20" />
      kai-chat · Angular example (web components)
    </span>

    <button
      (click)="toggleTheme()"
      aria-label="Toggle light/dark"
      class="theme-btn"
      [style.border]="'1px solid ' + (isDark() ? '#3f3f46' : '#d4d4d8')"
      [style.background]="isDark() ? '#18181b' : '#fff'"
      [style.color]="isDark() ? '#fafafa' : '#18181b'"
      [innerHTML]="themeIconHtml"
    ></button>
  </header>

  <!-- Main area: the flagship <kai-workspace> element.
       [prop] sets DOM properties; (event) listens for CustomEvents. -->
  <div class="main-area">
    <!--
      <kai-workspace> is the batteries-included shell: sidebar +
      conversation list + chat panel + resize handle, all in one element.

      Property bindings ([prop]):
        - [groups]          SampleGroup[]        — sidebar group headers
        - [conversations]   SampleConversation[] — sidebar conversation list
        - [activeId]        string               — highlighted conversation
        - [messages]        SampleMessage[]      — chat message thread
        - [models]          SampleModel[]        — model picker options
        - [currentModel]    string               — selected model id
        - [context]         object               — token-usage context meter
        - [suggestions]     string[]             — prompt suggestions
        - [slashCommands]   object[]             — slash-command items
        - [loading]         boolean              — streaming / loading state
        - [theme]           'light'|'dark'|'auto'

      Event bindings ((event)):
        - (kai-submit)              — user sends a message
        - (kai-message-action)       — copy / like / dislike / regenerate
        - (kai-model-change)         — model picker changed
        - (kai-conversation-select)  — sidebar item clicked
        - (kai-new-chat)             — "New chat" button clicked
        - (kai-sidebar-toggle)       — hamburger / sidebar toggle
    -->
    <kai-workspace
      [groups]="groups"
      [conversations]="conversations()"
      [activeId]="activeId()"
      [messages]="messages()"
      [models]="models"
      [currentModel]="currentModel()"
      [context]="context"
      [suggestions]="suggestions"
      [slashCommands]="slashCommands"
      [loading]="loading()"
      [theme]="theme()"
      (kai-submit)="onSubmit($event)"
      (kai-message-action)="onMessageAction($event)"
      (kai-model-change)="onModelChange($event)"
      (kai-conversation-select)="onConversationSelect($event)"
      (kai-new-chat)="onNewChat()"
      (kai-sidebar-toggle)="onSidebarToggle()"
      style="flex: 1; min-height: 0;"
    ></kai-workspace>
  </div>

  <!-- Standalone <kai-prompt-input> — proves a leaf element works on its own. -->
  <div class="standalone-section" [style.borderTop]="'1px solid ' + borderColor">
    <div class="standalone-label">
      Standalone &lt;kai-prompt-input&gt; (try typing <code>/</code> for slash commands):
    </div>
    <kai-prompt-input
      placeholder="Standalone prompt input…"
      [slashCommands]="slashCommands"
      [theme]="theme()"
      (kai-submit)="onStandaloneSubmit($event)"
    ></kai-prompt-input>
    @if (draftSubmissions().length > 0) {
      <ul class="draft-list">
        @for (d of draftSubmissions(); track d) {
          <li>submitted: {{ d }}</li>
        }
      </ul>
    }
  </div>

  <!-- Toast notification -->
  @if (toast()) {
    <div class="toast">{{ toast() }}</div>
  }
</div>
