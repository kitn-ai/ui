name: Deploy docs site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec nx build docs   # builds @kitn.ai/ui first (dependsOn ^build), then astro

      # Also publish Storybook under /storybook of the docs site, so it serves at
      # ui.kitn.ai/storybook from this same GitHub Pages deploy. `nx build-storybook
      # ui` builds the kit dist first (its dependsOn) so the static build registers
      # the kai-* elements; Storybook's relative asset paths work unchanged under
      # the subpath. Copy it in as a /storybook subdir (additive — never touches the
      # docs at /).
      - name: Build Storybook into the docs /storybook subpath
        run: |
          pnpm exec nx build-storybook ui
          rm -rf apps/docs/dist/storybook
          cp -R packages/ui/storybook-static apps/docs/dist/storybook

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
