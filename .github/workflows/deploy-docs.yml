name: Deploy docs site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify the deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent Pages deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json

      # The docs site syncs its element bundle + generated metas from the LIVE
      # kit build (scripts/sync-kit.mjs, run on prebuild) — so build the kit first.
      - name: Install kit dependencies
        run: npm ci
      - name: Build kit (element bundle + element-meta/theme/schemas)
        run: npm run build

      - name: Install docs-site dependencies
        run: npm ci
        working-directory: docs-site
      - name: Build docs site (base /chat, prebuild syncs the fresh kit)
        run: npm run build
        working-directory: docs-site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
