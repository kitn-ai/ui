name: Release

# release-please watches Conventional Commits on main and maintains a "release
# PR" that bumps the version and updates CHANGELOG.md. Merging that PR creates
# the git tag + GitHub Release, and (in the same run) publishes to npm.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm trusted publishing (OIDC) + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Everything below runs when a release PR is merged (auto) OR when this
      # workflow is dispatched manually (workflow_dispatch). Use the manual
      # trigger to publish the current main version if the auto-gate ever
      # misses -- for example, after the release-please config path moved from
      # "." to "packages/ui", which caused release_created to evaluate false
      # even though the tag and GitHub release were created. Release PRs should
      # be merge-committed (not squashed) so release-please can read its own
      # commit back and set the output correctly.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.releases_created || github.event_name == 'workflow_dispatch' }}

      - uses: pnpm/action-setup@v4
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.releases_created || github.event_name == 'workflow_dispatch' }}
      - uses: actions/setup-node@v4
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.releases_created || github.event_name == 'workflow_dispatch' }}
        with:
          node-version: 22 # trusted publishing needs Node >= 22.14
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.releases_created || github.event_name == 'workflow_dispatch' }}

      # OIDC trusted publishing needs npm >= 11.5.1 (Node 22 ships an older npm).
      - run: npm install -g npm@latest
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.releases_created || github.event_name == 'workflow_dispatch' }}

      # Publish with the npm CLI (NOT pnpm publish -- pnpm does not do npm's OIDC
      # token exchange, so it publishes unauthenticated and gets E404). Run from the
      # package dir; prepublishOnly runs the build. No NODE_AUTH_TOKEN; provenance
      # is automatic with OIDC for a public package.
      - name: Publish to npm (OIDC trusted publishing)
        working-directory: packages/ui
        run: npm publish --access public
        if: ${{ steps.release.outputs.release_created || steps.release.outputs.releases_created || github.event_name == 'workflow_dispatch' }}
