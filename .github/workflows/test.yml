name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Install before any test step: `npm test` runs the Storybook browser
      # project (stories-as-tests via @storybook/addon-vitest), and
      # `test:storybook` + `test:e2e` also need the browser. Installing here
      # makes chromium available to every step (was previously installed too
      # late, after the unit/storybook steps, so they failed to launch a browser).
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build (element bundle + provider subpath)
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      # Run ONLY the jsdom unit project here. `npm test` (= `vitest run`) would
      # also spin up the storybook BROWSER project concurrently — running the
      # forks-pool unit suite and a chromium instance at the same time exhausts
      # the runner's memory and chromium's connection drops mid-suite
      # ("[birpc] rpc is closed", "Browser connection was closed"). Scoping this
      # step to the unit project (and giving the browser project its own
      # isolated step below) keeps the two from competing and avoids running the
      # ~118-story browser suite twice.
      - name: Unit tests (jsdom)
        run: npm test -- --project=unit

      - name: React adapter tests
        run: npm run test:react

      # The storybook browser project runs ~118 stories through a single
      # chromium session; under CI load a renderer page occasionally dies
      # mid-run and aborts the whole vitest runner ("Browser connection was
      # closed" / "[birpc] rpc is closed") — a process-level crash, NOT a
      # per-test failure, so vitest's own `retry` can't recover it. The crash is
      # non-deterministic and a clean run passes every test, so retry the WHOLE
      # suite as a fresh process; a real, repeatable regression still fails all
      # attempts and goes red.
      - name: Storybook tests (a11y + interaction)
        run: npm run test:storybook:ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Cross-origin e2e matrix
        run: npm run test:e2e
