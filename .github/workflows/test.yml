name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # The REQUIRED check. Everything here is deterministic: build, typecheck, the
  # jsdom unit project, the React adapter tests, and the cross-origin e2e
  # security matrix. The flaky storybook BROWSER project lives in its own
  # `storybook` job below (gated/required via the `storybook-gate` aggregation
  # job), so environmental chromium crashes are retried away rather than
  # blocking merges.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (element bundle + provider subpath)
        run: pnpm exec nx build ui

      - name: Typecheck
        run: pnpm exec nx typecheck ui

      # Run ONLY the jsdom unit project. pnpm test (= vitest run) would also
      # spin up the storybook BROWSER project; that runs in its own job now.
      - name: Unit tests (jsdom)
        run: pnpm --filter @kitn.ai/ui exec vitest run --project=unit

      - name: React adapter tests
        run: pnpm --filter @kitn.ai/ui test:react

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Small, focused, retried-internally cross-origin postMessage SECURITY
      # matrix (remote-element.spec.ts) -- proves the host<>provider handshake
      # across two real origins, which jsdom and same-origin storybook can't.
      - name: Cross-origin e2e matrix
        run: pnpm --filter @kitn.ai/ui test:e2e

  # The storybook browser project runs ~112 *.stories.tsx as Playwright/chromium
  # browser tests (smoke render + play functions + axe a11y), sharded 8 ways at
  # ~14 files/shard to keep each chromium process under the memory ceiling.
  # Under CI load a renderer page occasionally dies mid-run and aborts the whole
  # vitest runner ("Browser connection was closed" / "[birpc] rpc is closed") —
  # a process-level crash, not a per-test failure, so vitest's own `retry` can't
  # recover it. It's environmental flake on standard GitHub runners (a clean run
  # passes every test). `test:storybook:ci` retries the whole slice up to 3x as a
  # fresh process to absorb that random chromium crash, and the stable
  # `storybook-gate` job (below) aggregates all shards into the single required
  # status context. A real, repeatable regression still fails every retry and
  # shows red here.
  storybook:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build (element bundle + provider subpath)
        run: pnpm exec nx build ui

      - name: Storybook tests (a11y + interaction) -- shard ${{ matrix.shard }}/8
        env:
          STORYBOOK_SHARD: ${{ matrix.shard }}/8
        run: pnpm --filter @kitn.ai/ui test:storybook:ci

  # Stable aggregation gate: the SINGLE required status context for the storybook
  # browser suite. `needs: [storybook]` makes `needs.storybook.result` 'success'
  # only when EVERY matrix shard succeeded; `if: always()` ensures this job still
  # runs (and can fail) when a shard fails, instead of being skipped. Branch
  # protection requires THIS context, not the per-shard `storybook (N)` contexts,
  # so changing the shard count never breaks the required-checks config.
  storybook-gate:
    needs: [storybook]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all storybook shards to pass
        run: |
          if [ "${{ needs.storybook.result }}" != "success" ]; then
            echo "storybook shards did not all succeed (result: ${{ needs.storybook.result }})"
            exit 1
          fi
          echo "all storybook shards passed"
